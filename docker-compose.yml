services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: preifma_api_ruby_development
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d preifma_api_ruby_development"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/preifma_api_ruby_development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
      secret_jwt: ${SECRET_JWT:-dev_secret_change_me}
    ports:
      - "3000:3000"
    command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]

volumes:
  db_data: