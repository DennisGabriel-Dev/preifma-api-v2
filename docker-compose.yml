services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: preifma_api_ruby_development
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/preifma_api_ruby_development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
    ports:
      - "3000:3000"
    command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]

volumes:
  db_data: